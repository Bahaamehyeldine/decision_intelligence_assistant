version: '3.8'

services:

  # ── Vector Database ──────────────────────────────────────────────────────────
  vector-db:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - dia_network
    restart: unless-stopped

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=vector-db
      - QDRANT_PORT=6333
      - OLLAMA_HOST=http://host.docker.internal:11434
      - LLM_MODEL=llama3.2:latest
      - LOG_DIR=/app/logs
    volumes:
      - ./data:/app/data
      - backend_logs:/app/logs
    depends_on:
      - vector-db
    networks:
      - dia_network
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - dia_network
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  qdrant_storage:
  backend_logs:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  dia_network:
    driver: bridge
